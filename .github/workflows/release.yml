name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      # No registry-url / NODE_AUTH_TOKEN: pnpm >=10.13 performs the OIDC
      # trusted-publishing exchange natively, and an auth entry in .npmrc
      # (even an empty one) makes it use that instead of OIDC.
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Generated files match source
        run: |
          pnpm generate
          if ! git diff --quiet; then
            echo '::error::Generated files are out of date. Run `pnpm generate` and commit the result.'
            git diff --stat
            exit 1
          fi

      - name: Lint
        run: pnpm lint

      # The per-icon modules are generated and gitignored, so a fresh CI
      # checkout only has them because `pnpm generate` ran above. Pack the
      # tarball and prove the critical files made it in — v2.3.0 shipped
      # without them and broke every consumer build.
      - name: Tarball contains generated icon modules
        run: |
          cd packages/web-components
          TARBALL="$(pnpm pack | tail -n1)"
          for f in src/icons/phosphor/_resolver.js src/icons/lucide/_resolver.js src/icons/phosphor/_manifest.js src/icons/lucide/_manifest.js; do
            if ! tar -tzf "$TARBALL" | grep -qx "package/$f"; then
              echo "::error::$f is missing from the npm tarball"
              exit 1
            fi
          done
          rm "$TARBALL"

      - name: Tag matches package version
        run: |
          PKG_VERSION="$(node -p "require('./packages/web-components/package.json').version")"
          if [ "v$PKG_VERSION" != "$GITHUB_REF_NAME" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match package version v$PKG_VERSION. Run pnpm bump-versions first."
            exit 1
          fi

      # OIDC trusted publishing: no token; provenance is generated
      # automatically. NPM_CONFIG_PROVENANCE stays as a guard so a silent
      # fallback to tokenless-unsigned publishing can never happen.
      # --no-git-checks is required on a detached tag checkout.
      - name: Publish all packages
        run: pnpm -r publish --access public --no-git-checks
        env:
          NPM_CONFIG_PROVENANCE: "true"

      - name: Create GitHub Release
        run: gh release create "$GITHUB_REF_NAME" --generate-notes --verify-tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
