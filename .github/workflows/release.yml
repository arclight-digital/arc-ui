name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Generated files match source
        run: |
          pnpm generate
          if ! git diff --quiet; then
            echo '::error::Generated files are out of date. Run `pnpm generate` and commit the result.'
            git diff --stat
            exit 1
          fi

      - name: Lint
        run: pnpm lint

      - name: Tag matches package version
        run: |
          PKG_VERSION="$(node -p "require('./packages/web-components/package.json').version")"
          if [ "v$PKG_VERSION" != "$GITHUB_REF_NAME" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match package version v$PKG_VERSION. Run pnpm bump-versions first."
            exit 1
          fi

      # OIDC trusted publishing: no token, provenance attached automatically.
      # --no-git-checks is required on a detached tag checkout.
      - name: Publish all packages
        run: pnpm -r publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ""
          NPM_CONFIG_PROVENANCE: "true"

      - name: Create GitHub Release
        run: gh release create "$GITHUB_REF_NAME" --generate-notes --verify-tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
