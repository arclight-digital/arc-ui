name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Generated files match source
        run: |
          pnpm generate
          if ! git diff --quiet; then
            echo '::error::Generated files are out of date. Run `pnpm generate` and commit the result.'
            git diff --stat
            exit 1
          fi

      - name: Lint
        run: pnpm lint

      - name: Typecheck generated declarations
        run: ./node_modules/.bin/tsc --noEmit --skipLibCheck --moduleResolution bundler --module esnext --target es2022 packages/web-components/types/index.d.ts
